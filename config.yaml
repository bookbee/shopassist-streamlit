# ---------------------------------------------------------------
# IISc Alumni Store — application configuration
# Values here can be overridden by environment variables / .env
# (see config.py for the override mapping).
# ---------------------------------------------------------------
app:
  title: "IISc Alumni Store"
  enable_chatbot: true
  # DEBUG shows the raw chat request payload sent to the API Gateway
  # (see chatbot/api_client.py's log.debug call). Override with LOG_LEVEL in .env.
  log_level: "INFO"

api:
  # Remote API Gateway that the chatbot talks to.
  # Override with API_BASE_URL in .env for deployments.
  base_url: "http://localhost:8000"
  chat_endpoint: "/api/v1/chat"
  timeout_seconds: 60
  # Dummy placeholder for the gateway's X-API-Key auth (see shopassist's
  # api/security.py). Override with API_KEY in .env once a real key is
  # issued - harmless as-is while the gateway's API_KEY_ENFORCE is off.
  api_key: "iisc-genai-c2g2p7"

colors:
  primary: "#8B3355"     # IISc maroon
  secondary: "#FFFFFF"
  accent: "#C99B2F"      # gold
  neutral: "#F8F2E7"     # warm light gray
